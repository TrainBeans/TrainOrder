spring.application.name=TrainOrder

# H2 in-memory database (data lost on restart)
spring.datasource.url=jdbc:h2:mem:trainorderdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 web console available at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Run schema.sql on every startup
spring.sql.init.mode=always

# Actuator
management.endpoints.web.exposure.include=health,info

